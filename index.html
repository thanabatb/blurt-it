<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blurt It!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 560px;
      padding: 2rem;
      text-align: center;
    }
    .screen.active { display: flex; }

    /* ── Start Screen ── */
    #start-screen h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
    }
    #start-screen .tagline {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: #ccc;
      max-width: 360px;
      line-height: 1.55;
      font-weight: 500;
    }
    #start-screen .sub-tagline {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #666;
      max-width: 340px;
      line-height: 1.5;
    }
    #start-screen .btn-start { margin-top: 1.75rem; }

    /* ── Timer selector ── */
    .timer-group {
      display: flex;
      gap: 8px;
      margin-top: 0.6rem;
    }
    .timer-btn {
      padding: 0.45rem 0.9rem;
      border-radius: 99px;
      font-size: 0.88rem;
      font-weight: 700;
      border: 2px solid #2a2a3e;
      background: #1a1a28;
      color: #555;
      cursor: pointer;
      transition: border-color 150ms, color 150ms, background 150ms;
    }
    .timer-btn:hover { color: #aaa; border-color: #444; }
    .timer-btn.active { border-color: #6c63ff; background: #211f3a; color: #c8c4ff; }

    /* ── Hide-answer toggle ── */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      background: #1a1a28;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
    }
    .setting-label {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      text-align: left;
    }
    .setting-label span {
      font-size: 0.88rem;
      font-weight: 600;
      color: #ccc;
    }
    .setting-label small {
      font-size: 0.72rem;
      color: #555;
    }

    /* pill toggle */
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 99px;
      background: #2e2e46;
      transition: background 200ms;
      cursor: pointer;
    }
    .toggle input:checked + .toggle-track { background: #6c63ff; }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      transition: transform 200ms;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

    /* ── Difficulty selector ── */
    .diff-label {
      margin-top: 2rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    .diff-group {
      display: flex;
      gap: 8px;
      margin-top: 0.6rem;
    }

    .diff-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 99px;
      font-size: 0.9rem;
      font-weight: 700;
      border: 2px solid #2a2a3e;
      background: #1a1a28;
      color: #555;
      transition: border-color 150ms, color 150ms, background 150ms;
    }
    .diff-btn:hover { color: #aaa; border-color: #444; }
    .diff-btn.active { border-color: #6c63ff; background: #211f3a; color: #c8c4ff; }
    .diff-btn.active.medium { border-color: #f0a840; background: #2a2010; color: #f0c060; }
    .diff-btn.active.hard   { border-color: #ff6060; background: #2a1010; color: #ff9090; }

    #diff-info {
      font-size: 0.82rem;
      color: #666;
      margin-top: 0.55rem;
      min-height: 1.2em;
      transition: opacity 150ms;
    }

    /* Difficulty badge shown in-round */
    #diff-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.7rem;
      border-radius: 99px;
      border: 1px solid;
    }
    #diff-badge.easy   { color: #9490cc; border-color: #3a3660; }
    #diff-badge.medium { color: #c09030; border-color: #5a4010; }
    #diff-badge.hard   { color: #cc6060; border-color: #601010; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.9rem 2.2rem;
      transition: transform 80ms, opacity 120ms;
    }
    button:active { transform: scale(0.96); }

    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-primary:hover { opacity: 0.88; }

    .btn-next {
      background: #1e1e2a;
      color: #c8c4ff;
      border: 2px solid #3a3660;
      font-size: 1rem;
      padding: 0.75rem 1.75rem;
    }
    .btn-next:hover { border-color: #6c63ff; color: #fff; }

    .btn-finish {
      background: none;
      color: #444;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    .btn-finish:hover { color: #ff6b6b; border-color: #3a1a1a; background: #1a0f0f; }

    /* ── Round Screen ── */
    #round-screen { gap: 1.75rem; }

    /* Pattern */
    #pattern-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }

    #cells {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cell {
      width: 62px;
      height: 76px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    .cell.known { background: #6c63ff; color: #fff; }
    .cell.blank { background: #1e1e2a; color: #444; border: 2px solid #2e2e3e; }

    #word-length {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #hint-pill {
      display: inline-block;
      background: #1a1a28;
      border: 1px solid #2e2e4a;
      border-radius: 99px;
      font-size: 0.78rem;
      color: #7a78aa;
      padding: 0.25rem 0.85rem;
      letter-spacing: 0.04em;
    }

    /* Timer */
    #timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; width: 100%; }

    @keyframes tickpulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    #clock {
      font-size: 4.5rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: #fff;
      transition: color 300ms;
    }
    #clock.low {
      color: #ff4d4d;
      animation: tickpulse 1s ease-in-out infinite;
    }

    #progress-track {
      width: 100%;
      height: 8px;
      background: #1e1e2a;
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      border-radius: 99px;
      background: #6c63ff;
      width: 100%;
      transition: width 0.9s linear, background 300ms;
    }
    #progress-bar.low { background: #ff4d4d; }

    /* ── Reveal Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
      z-index: 100;
    }
    #modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #modal {
      background: #16161f;
      border: 1px solid #2a2a3e;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      max-width: 480px;
      width: 100%;
      transform: translateY(12px);
      transition: transform 220ms ease;
    }
    #modal-overlay.visible #modal { transform: translateY(0); }

    #modal-eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6c63ff;
    }
    #modal-eyebrow.timeout { color: #ff4d4d; }

    #modal-meta {
      font-size: 0.82rem;
      color: #555;
      letter-spacing: 0.03em;
    }
    #modal-meta span { color: #7a78aa; font-weight: 600; }

    #modal-words-wrap {
      position: relative;
      width: 100%;
    }
    #modal-words-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: linear-gradient(transparent, #16161f);
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms;
    }
    #modal-words-wrap.overflows::after { opacity: 1; }

    #modal-words {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      justify-content: center;
      max-height: 260px;
      overflow-y: auto;
      padding: 0.25rem 0 0.5rem;
      scrollbar-width: none;
    }
    #modal-words::-webkit-scrollbar { display: none; }

    #modal-scroll-hint {
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      margin-top: -0.25rem;
      display: none;
    }
    #modal-words-wrap.overflows + #modal-scroll-hint { display: block; }

    .word-chip {
      display: inline-flex;
      align-items: center;
      padding: 0.3em 0.65em;
      border-radius: 8px;
      background: #3a2e00;
      border: 1px solid #c09000;
      color: #f0c040;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1;
      transition: background 150ms, border-color 150ms, color 150ms, filter 300ms;
    }

    /* Blurred state — hides all chips equally */
    #modal-words.blurred .word-chip {
      filter: blur(7px);
      user-select: none;
    }

    .btn-reveal {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #1e1e2e;
      color: #c8c4ff;
      border: 2px solid #3a3660;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: border-color 150ms, color 150ms, background 150ms, transform 80ms;
    }
    .btn-reveal:hover { border-color: #6c63ff; color: #fff; }
    .btn-reveal:active { transform: scale(0.96); }
    .btn-reveal.revealed {
      background: #16160e;
      border-color: #5a4800;
      color: #c09030;
    }
    .btn-reveal.revealed:hover { border-color: #c09000; color: #f0c040; }

    #modal-btn { margin-top: 0.25rem; }
  </style>
</head>
<body>

  <!-- Start Screen -->
  <div id="start-screen" class="screen active">
    <h1>Blurt It!</h1>
    <p class="tagline">A word race for friends, family, and anyone up for a shout.</p>
    <p class="sub-tagline">Spot the pattern. Blurt the word. No typing — just your voice.</p>
    <p class="diff-label">Difficulty</p>
    <div class="diff-group">
      <button class="diff-btn easy active" onclick="setDifficulty('easy')">Easy</button>
      <button class="diff-btn medium" onclick="setDifficulty('medium')">Medium</button>
      <button class="diff-btn hard" onclick="setDifficulty('hard')">Hard</button>
    </div>
    <p id="diff-info"></p>

    <p class="diff-label" style="margin-top:1.75rem">Timer</p>
    <div class="timer-group">
      <button class="timer-btn active" data-secs="60" onclick="setTimer(60)">1 min</button>
      <button class="timer-btn" data-secs="30" onclick="setTimer(30)">30 sec</button>
      <button class="timer-btn" data-secs="20" onclick="setTimer(20)">20 sec</button>
      <button class="timer-btn" data-secs="10" onclick="setTimer(10)">10 sec</button>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        <span>Show answer by default</span>
        <small>Turn off so host reveals when the group is ready</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="hide-answers-toggle" checked onchange="showByDefault = this.checked" />
        <div class="toggle-track"></div>
      </label>
    </div>

    <button class="btn-primary btn-start" onclick="startGame()">Start Game</button>
  </div>

  <!-- Round Screen -->
  <div id="round-screen" class="screen">
    <div id="pattern-wrap">
      <div id="diff-badge"></div>
      <div id="cells"></div>
      <div id="word-length"></div>
      <div id="hint-pill"></div>
    </div>

    <div id="timer-wrap">
      <div id="clock">1:00</div>
      <div id="progress-track">
        <div id="progress-bar"></div>
      </div>
    </div>

    <button class="btn-next" onclick="onNextWordClick()">Next Word →</button>
    <button class="btn-finish" onclick="finishGame()">Finish Game</button>
  </div>

  <!-- Reveal Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-eyebrow"></div>
      <div id="modal-meta"></div>
      <div id="modal-words-wrap">
        <div id="modal-words"></div>
      </div>
      <p id="modal-scroll-hint">↓ scroll to see more</p>
      <button class="btn-reveal" id="modal-reveal-btn" onclick="toggleReveal()">👁 Reveal Answer</button>
      <button class="btn-primary" id="modal-btn" onclick="doNextRound()">Next Word →</button>
    </div>
  </div>

      "recovered","recycling","reduction","reference","referrals","referring","refinance","reflected","regarding","registrar",
      "regularly","regulated","relations","relatives","relevance","religions","religious","remainder","remaining","removable",
      "rendering","renewable","replacing","reporters","reporting","represent","reproduce","requested","requiring","reservoir",
      "residence","residents","resistant","resources","respected","responded","responses","resulting","retailers","retention",
      "retrieval","retrieved","returning","reviewing","revisions","riverside","roommates","sacrifice","salvation","satellite",
      "satisfied","scenarios","scheduled","schedules","scientist","screening","scripting","sculpture","searching","secondary",
      "secretary","selecting","selection","selective","sensitive","sentences","separated","sequences","seriously","sexuality",
      "shareware","shipments","shortcuts","signature","similarly","situation","snowboard","societies","sociology","solutions",
      "something","sometimes","somewhere","southeast","southwest","specially","specialty","specifics","specified","specifies",
      "spiritual","spokesman","sponsored","spotlight","spreading","stability","stainless","standards","standings","statement",
      "statewide","statutory","stockings","strategic","streaming","strengths","structure","submitted","subscribe","substance",
      "suffering","suggested","summaries","suppliers","supported","surprised","survivors","suspected","suspended","sustained",
      "switching","symposium","syndicate","synthesis","synthetic","technical","technique","telephone","telephony","telescope",
      "templates","temporary","terminals","territory","terrorism","terrorist","testament","testimony","textbooks","therapist",
      "therefore","thesaurus","thickness","thousands","threshold","thumbnail","tolerance","trademark","tradition","transfers",
      "transform","translate","transport","travelers","traveling","traveller","treasurer","treasures","treatment","tutorials",
      "typically","undefined","undertake","underwear","universal","unlimited","upgrading","utilities","vacancies","vacations",
      "valentine","valuation","variables","variation","varieties","vegetable","violation","virtually","voluntary","volunteer",
      "wallpaper","warehouse","watershed","wholesale","witnesses","wonderful","wondering","workforce","workplace","workshops",
      "worldwide","wrestling","yesterday"
    ];

    let timeLeft = 0;
    let ticker = null;
    let currentWord = '';
    let currentPattern = null;
    let difficulty = 'easy';
    let showByDefault = true;
    let deck = [];
    let deckIndex = 0;

    const DIFF_LENGTHS = { easy: [4], medium: [5], hard: [6, 7, 8, 9] };
    const DIFF_LABELS  = { easy: 'Easy · 2 blanks', medium: 'Medium · 3 blanks', hard: 'Hard · 4+ blanks' };
    const DIFF_INFO    = {
      easy:   '2 blanks shown → 4-letter words (e.g. B _ _ K)',
      medium: '3 blanks shown → 5-letter words (e.g. B _ _ _ K)',
      hard:   '4+ blanks → 6–9 letter words (e.g. B _ _ _ _ K)',
    };

    function getWordPool() {
      const lengths = DIFF_LENGTHS[difficulty];
      return SEED_WORDS.filter(w => lengths.includes(w.length) && !w.endsWith('s'));
    }

    function setDifficulty(d) {
      difficulty = d;
      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.classList.toggle('active', btn.classList.contains(d));
      });
      document.getElementById('diff-info').textContent = DIFF_INFO[d];
    }

    function setTimer(s) {
      roundSeconds = s;
      document.querySelectorAll('.timer-btn').forEach(btn => {
        btn.classList.toggle('active', Number(btn.dataset.secs) === s);
      });
    }

    // Show info for default difficulty on load
    setDifficulty('easy');

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Minimum words a pattern must have to enter the deck, per difficulty
    const MIN_POOL_SIZE = { easy: 4, medium: 4, hard: 4 };

    function buildDeck() {
      // One representative word per unique (first, last, len) pattern per cycle
      const pool = getWordPool();
      const minSize = MIN_POOL_SIZE[difficulty];
      const byPattern = new Map();
      for (const w of pool) {
        const key = w[0] + w[w.length - 1] + w.length;
        if (!byPattern.has(key)) byPattern.set(key, []);
        byPattern.get(key).push(w);
      }
      // Drop thin patterns, then pick a random word per group and shuffle
      const richPatterns = [...byPattern.values()].filter(words => words.length >= minSize);
      deck = shuffle(richPatterns.map(words => words[Math.floor(Math.random() * words.length)]));
      deckIndex = 0;
    }

    function pickPattern() {
      if (deckIndex >= deck.length) buildDeck();
      const word = deck[deckIndex++];
      const pattern = { first: word[0], last: word[word.length - 1], len: word.length };
      currentWord = word;
      currentPattern = pattern;
      return pattern;
    }

    function countPossible(pattern) {
      return SEED_WORDS.filter(w =>
        w[0] === pattern.first &&
        w[w.length - 1] === pattern.last &&
        w.length === pattern.len
      ).length;
    }

    function renderPattern(pattern) {
      const cells = document.getElementById('cells');
      cells.innerHTML = '';

      for (let i = 0; i < pattern.len; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (i === 0) {
          cell.textContent = pattern.first;
          cell.classList.add('known');
        } else if (i === pattern.len - 1) {
          cell.textContent = pattern.last;
          cell.classList.add('known');
        } else {
          cell.textContent = '?';
          cell.classList.add('blank');
        }
        cells.appendChild(cell);
      }

      document.getElementById('word-length').textContent = `${pattern.len} letters`;

      const count = countPossible(pattern);
      document.getElementById('hint-pill').textContent =
        count === 1 ? '1 possible word in pool' : `${count} possible words in pool`;
    }

    function startTimer() {
      clearInterval(ticker);
      timeLeft = roundSeconds;
      updateTimerDisplay();
      ticker = setInterval(tick, 1000);
    }

    function tick() {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        clearInterval(ticker);
        showModal(true);
      }
    }

    function updateTimerDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const clock = document.getElementById('clock');
      const bar = document.getElementById('progress-bar');

      clock.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      clock.classList.toggle('low', timeLeft <= 10);

      bar.style.width = `${(timeLeft / roundSeconds) * 100}%`;
      bar.classList.toggle('low', timeLeft <= 10);
    }

    // Font size inversely scaled by word length: 4 letters → biggest, 9 → smallest
    const CHIP_SIZES = { 4: '1.55rem', 5: '1.3rem', 6: '1.1rem', 7: '0.97rem', 8: '0.87rem', 9: '0.78rem' };
    const CHIP_WEIGHTS = { 4: 800, 5: 800, 6: 700, 7: 700, 8: 600, 9: 600 };

    function showModal(isTimeout) {
      const eyebrow = document.getElementById('modal-eyebrow');
      eyebrow.textContent = isTimeout ? "Time's up!" : 'Next word';
      eyebrow.className = isTimeout ? 'timeout' : '';

      const matches = SEED_WORDS.filter(w =>
        w[0] === currentPattern.first &&
        w[w.length - 1] === currentPattern.last &&
        w.length === currentPattern.len
      ).sort((a, b) => a.localeCompare(b));

      const meta = document.getElementById('modal-meta');
      meta.innerHTML = `<span>${matches.length}</span> ${matches.length === 1 ? 'word' : 'words'} match this pattern`;

      const container = document.getElementById('modal-words');
      container.innerHTML = '';
      for (const word of matches) {
        const chip = document.createElement('div');
        chip.className = 'word-chip' + (word === currentWord ? ' current' : '');
        chip.textContent = word;
        chip.style.fontSize = CHIP_SIZES[word.length] || '0.9rem';
        chip.style.fontWeight = CHIP_WEIGHTS[word.length] || 600;
        container.appendChild(chip);
      }

      // Apply blur based on pre-game setting; reveal button always available as override
      const revealBtn = document.getElementById('modal-reveal-btn');
      if (showByDefault) {
        container.classList.remove('blurred');
        revealBtn.textContent = '🙈 Hide Answer';
        revealBtn.classList.add('revealed');
      } else {
        container.classList.add('blurred');
        revealBtn.textContent = '👁 Reveal Answer';
        revealBtn.classList.remove('revealed');
      }

      // Show overflow gradient + hint after render
      requestAnimationFrame(() => {
        const wrap = document.getElementById('modal-words-wrap');
        const overflows = container.scrollHeight > container.clientHeight;
        wrap.classList.toggle('overflows', overflows);
      });

      document.getElementById('modal-overlay').classList.add('visible');
    }

    function toggleReveal() {
      const container = document.getElementById('modal-words');
      const btn = document.getElementById('modal-reveal-btn');
      const isBlurred = container.classList.toggle('blurred');
      if (isBlurred) {
        btn.textContent = '👁 Reveal Answer';
        btn.classList.remove('revealed');
      } else {
        btn.textContent = '🙈 Hide Answer';
        btn.classList.add('revealed');
      }
    }

    function doNextRound() {
      document.getElementById('modal-overlay').classList.remove('visible');
      const pattern = pickPattern();
      renderPattern(pattern);
      startTimer();
    }

    function onNextWordClick() {
      clearInterval(ticker);
      showModal(false);
    }

    function finishGame() {
      clearInterval(ticker);
      document.getElementById('modal-overlay').classList.remove('visible');
      document.getElementById('round-screen').classList.remove('active');
      document.getElementById('start-screen').classList.add('active');
      deck = [];
      deckIndex = 0;
    }

    function startGame() {
      const badge = document.getElementById('diff-badge');
      badge.textContent = DIFF_LABELS[difficulty];
      badge.className = difficulty;

      document.getElementById('start-screen').classList.remove('active');
      document.getElementById('round-screen').classList.add('active');
      buildDeck();
      const pattern = pickPattern();
      renderPattern(pattern);
      startTimer();
    }
  </script>
